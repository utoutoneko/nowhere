<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>クローズ相談部屋</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="header">クローズ相談部屋（人数：<span id="count">0</span>）</div>

<div id="passwordArea">
  <input id="passInput" type="password" placeholder="パスワードを入力" />
  <button id="passBtn">入室</button>
</div>

<div id="chatArea" style="display:none;">
  <div id="chat"></div>

  <div id="inputArea">
    <input id="msgInput" type="text" placeholder="メッセージを入力..." />
    <button id="sendBtn">送信</button>
  </div>
</div>

<script type="module">
  import { initAuth, enterRoom, watchPresence, sendMessage, watchMessages, checkPassword } from "./chat-core.js";

  passBtn.onclick = async () => {
    const ok = await checkPassword(passInput.value);
    if (!ok) {
      alert("パスワードが違います");
      return;
    }

    passwordArea.style.display = "none";
    chatArea.style.display = "block";

    initAuth(() => {
      enterRoom("close");

      watchPresence("close", (num) => {
        document.getElementById("count").innerText = num;
      });

      watchMessages("close", (msg) => {
        const div = document.createElement("div");
        div.className = "msg";
        div.innerHTML = `<b>${msg.uid.slice(0,6)}</b><br>${msg.text}`;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
      });
    });

    sendBtn.onclick = () => {
      const text = msgInput.value;
      if (!text) return;
      sendMessage("close", text);
      msgInput.value = "";
    };
  };
</script>

</body>
</html>
