<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>オープン相談部屋</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="header">オープン相談部屋（人数：<span id="count">0</span>）</div>

<div id="chat"></div>

<div id="inputArea">
  <input id="msgInput" type="text" placeholder="メッセージを入力..." />
  <button id="sendBtn">送信</button>
</div>

<script type="module">
  import { initAuth, enterRoom, watchPresence, sendMessage, watchMessages } from "./chat-core.js";

  initAuth(() => {
    enterRoom("open");

    watchPresence("open", (num) => {
      document.getElementById("count").innerText = num;
    });

    watchMessages("open", (msg) => {
      const div = document.createElement("div");
      div.className = "msg";
      div.innerHTML = `<b>${msg.uid.slice(0,6)}</b><br>${msg.text}`;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    });
  });

  sendBtn.onclick = () => {
    const text = msgInput.value;
    if (!text) return;
    sendMessage("open", text);
    msgInput.value = "";
  };
</script>

</body>
</html>
